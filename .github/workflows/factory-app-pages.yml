name: Deploy Factory App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'factory-app/**'
      - 'docs/factory-state.json'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy factory-state.json into factory-app
        run: cp docs/factory-state.json factory-app/factory-state.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: factory-app/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Summary
        run: |
          echo "## ? Factory App Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
